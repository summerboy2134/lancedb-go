# Configuration for cbindgen
language = "C"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
pragma_once = true
include_guard = "LANCEDB_H"
usize_is_size_t = true

# Export every public C ABI symbol.  Keeping a handwritten allow-list here had
# silently omitted newer functions from generated headers.
[export]

[struct]
rename_fields = "ScreamingSnakeCase"

[enum]
rename_variants = "ScreamingSnakeCase"

[fn]
rename_args = "snake_case"
